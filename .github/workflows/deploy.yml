name: Deploy Webgame to Pages

on:
  push:
    branches: 'main' # Löst das Deployment aus, sobald du auf 'main' pushst

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Type Check (js/core, js/controllers via JSDoc + tsc)
        run: npm run typecheck

      - name: Run Tests
        run: npm test

      - name: Build Game with Vite
        run: npm run build

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Vite legt den fertigen Build standardmäßig im Ordner 'dist' ab
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4