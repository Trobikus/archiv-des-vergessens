name: Tauri Release Build

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write  # Zum Erstellen von GitHub Releases

jobs:
  release:
    name: Build & Release Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Dependencies
        run: npm install

      - name: Run Tests
        run: npm test

      - name: Run TypeCheck
        run: npm run typecheck

      - name: Build Tauri Executable
        run: npm run tauri:build

      - name: Create GitHub Release & Upload Executable
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/release/ArchivDesVergessens.exe
          name: ArchivDesVergessens ${{ github.ref_name }}
          body: |
            Neues Portable-Release für ArchivDesVergessens (${{ github.ref_name }}).
            Lade einfach die `ArchivDesVergessens.exe` herunter und starte sie direkt!
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

